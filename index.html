<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede de Conexões de Filmes e Atores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Rede de Conexões: Filmes e Atores</h1>
    <div id="actors-list">
        <h2>Atores Ordenados</h2>
        <select id="actor1" multiple size="10"></select>
        <select id="actor2" multiple size="10"></select>
        <button id="select-actors">Selecionar Atores para Busca 1</button>
    </div>
    <div id="searches">
        <h2>Busca 1: Distância Mais Curta Entre Dois Atores</h2>
        <p id="busca1-result"></p>
        <h2>Busca 2: Resultados Até o Nível 8 a Partir de um Ator</h2>
        <select id="start-actor">
            <option value="">Selecione um Ator</option>
        </select>
        <button id="run-busca2">Executar Busca 2</button>
        <div id="busca2-result"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
