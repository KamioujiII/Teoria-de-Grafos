<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Atores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Rede de Conexões: Filmes e Atores</h1>
    <div id="actors-list">
        <h2>Atores Ordenados</h2>
        <input type="text" id="search-actor1" placeholder="Buscar ator...">
        <select id="actor1" size="10"></select>
        <input type="text" id="search-actor2" placeholder="Buscar ator...">
        <select id="actor2" size="10"></select>
        <button id="select-actors">Selecionar Atores para Busca 1</button>
    </div>
    <div id="searches">
        <h2>Busca 1: Distância Mais Curta Entre Dois Atores</h2>
        <p id="busca1-result"></p>
        <h2>Busca 2: Caminhos até 8 níveis entre dois atores</h2>
        <button id="run-busca2">Executar Busca 2</button>
        <div id="busca2-result"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
